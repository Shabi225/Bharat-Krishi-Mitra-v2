<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>कृषि योजनाएं | Agricultural Schemes</title>
  <script type="text/javascript">

  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'hi',
      includedLanguages: 'en,hi,bn,mr,te,ta,gu,ur,kn,or,ml,pa,as',
      layout: google.translate.TranslateElement.InlineLayout.DROPDOWN,
      autoDisplay: false,
      multilanguagePage: true
    }, 'google_translate_element')
  }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
 
  <link rel="stylesheet" href="./styles/schemes.css">
 
  <script src="./schemes.js"></script>
  <script defer src="./voice-assistant.js"></script>
</head>
<body>
<!-- Add to top of <body>, before schemes-container -->
<header class="main-header">
  <!-- Google Translate Script (in <head>) -->
  
  
  <nav class="top-nav">
    <!-- Left: Logo/Title -->
    <div class="nav-brand">
      <h2 data-translate="no">🌾 Bharat Krishi Mitra</h2>
    </div>
    
    <!-- Center: Main Nav Dropdown -->
    <div class="nav-dropdown">
      <button class="nav-dropbtn" onclick="toggleNavMenu()">☰ मेनू</button>
      <div class="nav-content" id="navMenu">
        <a href="index.html" data-i18n="home">होम | Home</a>
        <a href="schemes.html" class="active">योजनाएँ | Schemes</a>
        <a href="weather.html">मौसम | Weather</a>
      </div>
    </div>

      
    
    <!-- Right: Language Dropdown (Custom) -->
    <div id="google_translate_element" style="display: none;"></div>
    <div class="lang-section" style="margin-left: auto;">
      <select id="language" onchange="changeLanguage(this.value)" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc; background: white;">
        <option value="hi">हिन्दी (Hindi)</option>
        <option value="en">English</option>
        <option value="bn">বাংলা (Bengali)</option>
        <option value="mr">मराठी (Marathi)</option>
        <option value="te">తెలుగు (Telugu)</option>
        <option value="ta">தமிழ் (Tamil)</option>
        <option value="gu">ગુજરાતી (Gujarati)</option>
        <option value="ur">اردू (Urdu)</option>
        <option value="kn">ಕನ್ನಡ (Kannada)</option>
        <option value="or">ଓଡ଼ିଆ (Oriya)</option>
        <option value="ml">മലയാളം (Malayalam)</option>
        <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
        <option value="as">অসমীয়া (Assamese)</option>
      </select>
    </div>
  </nav>
</header>

<script>
function changeLanguage(langCode) {
    const checkEngine = setInterval(() => {
        const combo = document.querySelector('.goog-te-combo');
        if (combo) {
            combo.value = langCode;
            combo.dispatchEvent(new Event('change'));
            clearInterval(checkEngine);
            console.log("✅ Translation triggered for:", langCode);
        }
    }, 100);
    setTimeout(() => clearInterval(checkEngine), 5000);
}
</script>

<div class="schemes-container">
  <!-- Left Filters -->
  <div class="filters">
    <h3>फ़िल्टर</h3>
    <div class="filter-group">
      <h4>लिंग</h4>
      <label><input type="checkbox" value="सभी" onchange="filterSchemes()"> सभी</label>
      <label><input type="checkbox" value="पुरुष" onchange="filterSchemes()"> पुरुष</label>
      <label><input type="checkbox" value="महिला" onchange="filterSchemes()"> महिला</label>
    </div>
    <div class="filter-group">
      <h4>जाति</h4>
      <label><input type="checkbox" value="सभी" onchange="filterSchemes()"> सभी</label>
      <label><input type="checkbox" value="सामान्य" onchange="filterSchemes()"> सामान्य</label>
      <label><input type="checkbox" value="ओबीसी" onchange="filterSchemes()"> ओबीसी</label>
      <label><input type="checkbox" value="एससी" onchange="filterSchemes()"> एससी</label>
      <label><input type="checkbox" value="एसटी" onchange="filterSchemes()"> एसटी</label>
    </div>
    <div class="filter-group">
      <h4>आयु</h4>
      <label><input type="checkbox" value="18-30" onchange="filterSchemes()"> 18-30</label>
      <label><input type="checkbox" value="30-60" onchange="filterSchemes()"> 30-60</label>
      <label><input type="checkbox" value="60+" onchange="filterSchemes()"> 60+</label>
    </div>
    <div class="filter-group">
      <h4>राज्य/केंद्र</h4>
      <label><input type="checkbox" value="मध्यप्रदेश" onchange="filterSchemes()"> मध्य प्रदेश</label>
      <label><input type="checkbox" value="केंद्र" onchange="filterSchemes()"> केंद्र</label>
    </div>
    <div class="filter-group">
      <h4>श्रेणी</h4>
      <label><input type="checkbox" value="आय सहायता" onchange="filterSchemes()"> आय सहायता</label>
      <label><input type="checkbox" value="फसल बीमा" onchange="filterSchemes()"> फसल बीमा</label>
      <label><input type="checkbox" value="ऋण" onchange="filterSchemes()"> ऋण सहायता</label>
    </div>
    <button onclick="clearFilters()" class="clear-btn">सभी फ़िल्टर हटाएं</button>
  </div>
  
  <!-- Cards + Pagination Wrapper -->
  <div class="cards-wrapper">
    <!-- Cards Container -->
    <div class="cards-container">
      <div class="cards-grid" id="schemesGrid">
        <!-- Cards load here -->
      </div>
    </div>
    
    <!-- Pagination at Bottom -->
    <div class="pagination" id="pagination" style="display:none;">
      <!-- 1 2 3... buttons generated by JS -->
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal" onclick="closeDetail()">
  <div class="detail" onclick="event.stopPropagation()">
    <h2 id="detailTitle">योजना विवरण</h2>
    <div id="detailContent">विवरण यहाँ JSON से लोड होगा...</div>
    <button onclick="closeDetail()" class="close-btn">बंद करें</button>
  </div>
</div>

</body>
</html>
